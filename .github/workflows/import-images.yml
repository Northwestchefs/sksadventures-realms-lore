name: Import NPC Image Packs

on:
  push:
    paths:
      - 'imports/zips/*.zip'

jobs:
  import-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run importer
        run: npm run images:import-zips

      - name: Commit imported images
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add assets/images
          git commit -m "Auto-import NPC images" || echo "No changes"
          git push